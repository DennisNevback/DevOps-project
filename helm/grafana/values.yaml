grafana:
  adminUser: admin
  adminPassword: password

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus-server
          isDefault: true

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard

  grafana.ini:
    server:
      root_url: http://localhost:8080/grafana
      serve_from_sub_path: true
