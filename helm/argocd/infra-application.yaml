apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-application
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/DennisNevback/DevOps-project
    targetRevision: main
    path: k8s/infra
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
